    </header>

    <!-- Todo Box -->
    <section>
        <div class="container">
            <h2 class="todo-header">لیست کارها</h2>

            <div class="input-todo">
                <input id="inputTask" type="text" placeholder="تسک جدید...">
                <button>+</button>
            </div>

            <ul class="todo-list">
            </ul>

            <div class="info-box">
                <span>شما <span class="pendingTasks"></span> تسک برای انجام دارید.</span>
                <button>پاک کردن همه</button>
            </div>
        </div>
    </section>
